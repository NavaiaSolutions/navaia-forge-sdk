name: Python SDK CI

on:
  push:
    branches: [develop, main]
    paths:
      - "packages/python/**"
      - ".github/workflows/python-sdk.yml"
  pull_request:
    paths:
      - "packages/python/**"
      - ".github/workflows/python-sdk.yml"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/python
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install package + dev + langgraph extras
        run: |
          python -m pip install --upgrade pip
          # langgraph extra is required for tests/integrations/test_langgraph_*.py
          # which exercise the lazy langchain_core import path. Without it, those
          # tests raise ImportError at module load and fail the suite.
          pip install -e ".[dev,langgraph]"

      - name: Lint (ruff)
        run: ruff check navaia_forge tests

      - name: Run tests with coverage
        run: pytest --cov=navaia_forge --cov-report=term --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: packages/python/coverage.xml
          if-no-files-found: ignore
