[project]
name = "navaia-forge"
version = "0.2.3"
description = "Python SDK for the NavaiaForge AI workforce platform"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
    { name = "Navaia", email = "info@navaia.sa" },
]
keywords = ["ai", "agents", "workforce", "orchestration", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.6",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-httpx>=0.30.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]
# Bring an existing LangGraph workforce into Forge with observability and
# backend access wired in. Only depends on langchain-core; users with a
# full langgraph install already have it transitively.
langgraph = [
    "langchain-core>=0.3,<1.0",
]

[project.urls]
Homepage = "https://github.com/navaia/navaia-forge"
Repository = "https://github.com/navaia/navaia-forge"
Documentation = "https://github.com/navaia/navaia-forge#readme"
Issues = "https://github.com/navaia/navaia-forge/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["navaia_forge"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "unit: fast in-process unit tests",
    "integration: HTTP-shape integration tests (mocked transport)",
]
